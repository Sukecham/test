<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>あさのしたく</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Yomogi&family=Kosugi+Maru&display=swap');

  :root {
    /* ゆいちゃん：キティ寄せ 赤リボン×白 */
    --yui:      #ff5d8f;
    --yui-deep: #d6336c;
    --yui-bg:   #fff0f4;
    /* みおちゃん：ポチャッコ寄せ 水色×白 */
    --mio:      #5cc6e0;
    --mio-deep: #2a93b5;
    --mio-bg:   #eef9fc;
    --cream: #fffaf2;
    --ink: #514742;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Kosugi Maru', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    transition: background 0.4s;
  }
  body.theme-yui {
    background:
      radial-gradient(circle at 18% 8%, #ffd9e4 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, #ffe3ec 0%, transparent 45%),
      var(--yui-bg);
  }
  body.theme-mio {
    background:
      radial-gradient(circle at 18% 8%, #d4f1f9 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, #e0f6fb 0%, transparent 45%),
      var(--mio-bg);
  }

  .deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.45; }
  .deco span { position: absolute; font-size: 2.4rem; animation: floaty 6s ease-in-out infinite; }
  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(-8deg); } 50% { transform: translateY(-14px) rotate(8deg); } }

  header { position: relative; z-index: 1; text-align: center; padding: 1.3rem 1rem 0.5rem; }
  header h1 {
    font-family: 'Yomogi', cursive; font-size: 1.85rem; letter-spacing: 0.05em;
    text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(0,0,0,0.05);
  }
  .date { font-size: 0.85rem; color: #a8978f; margin-top: 0.2rem; }

  .tabs {
    position: relative; z-index: 1; display: flex; gap: 0.6rem;
    justify-content: center; padding: 0.8rem 1rem 0.4rem;
  }
  .tab {
    flex: 1; max-width: 180px; border: none; border-radius: 24px 24px 0 0;
    padding: 0.85rem 0.5rem; font-family: 'Yomogi', cursive; font-size: 1.2rem;
    cursor: pointer; transition: transform 0.15s, opacity 0.2s;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06) inset; opacity: 0.5;
  }
  .tab .face { font-size: 1.55rem; display: block; }
  .tab.yui { background: var(--yui); color: #fff; }
  .tab.mio { background: var(--mio); color: #fff; }
  .tab.active { opacity: 1; transform: translateY(-3px) scale(1.05); }

  main { position: relative; z-index: 1; max-width: 440px; margin: 0 auto; padding: 1rem 1.1rem 3rem; }

  .board {
    background: #fff; border-radius: 0 0 28px 28px;
    border-top: 6px solid var(--accent);
    padding: 1.2rem 1rem 1.5rem; box-shadow: 0 14px 32px rgba(120,90,70,0.13);
  }
  .board.yui { --accent: var(--yui); --accent-deep: var(--yui-deep); --accent-bg: var(--yui-bg); }
  .board.mio { --accent: var(--mio); --accent-deep: var(--mio-deep); --accent-bg: var(--mio-bg); }

  .greeting {
    text-align: center; font-family: 'Yomogi', cursive; font-size: 1.15rem;
    margin-bottom: 0.5rem; color: var(--accent-deep);
  }
  .greeting .badge { font-size: 1.7rem; }

  .count-line {
    text-align: center; font-family: 'Yomogi', cursive;
    font-size: 0.95rem; color: var(--accent-deep); margin-bottom: 1.1rem;
  }
  .meter { height: 14px; background: #f0e6dc; border-radius: 8px; overflow: hidden; margin: 0.45rem auto 0; max-width: 88%; }
  .fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-deep)); border-radius: 8px; transition: width 0.55s cubic-bezier(.3,1,.4,1); }

  .section-title {
    font-family: 'Yomogi', cursive; font-size: 1rem; color: #b3a298;
    margin: 0.4rem 0 0.7rem; padding-left: 0.3rem;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .section-title::after { content: ""; flex: 1; height: 2px; background: #f2e8de; border-radius: 2px; }
  .section-title.home { margin-top: 1.4rem; }

  .task {
    display: flex; align-items: center; gap: 0.9rem;
    background: var(--accent-bg); border-radius: 20px;
    padding: 0.7rem 0.9rem; margin-bottom: 0.75rem; transition: background 0.3s;
  }
  .task.done { filter: saturate(1.1); box-shadow: 0 0 0 2px var(--accent) inset; }

  .task-label { flex: 1; }
  .task-label .emoji { font-size: 1.7rem; letter-spacing: -0.1rem; }
  .task-label .name { font-size: 1.15rem; margin-top: 0.15rem; }

  .stamp-slot {
    width: 74px; height: 74px; flex-shrink: 0; border-radius: 50%;
    border: 3px dashed #dcccc0; background: rgba(255,255,255,0.65);
    cursor: pointer; position: relative; display: grid; place-items: center;
    transition: transform 0.12s;
  }
  .stamp-slot:active { transform: scale(0.88); }
  .stamp-slot .hint { font-size: 0.7rem; color: #bbaca1; text-align: center; line-height: 1.2; }
  .stamp-slot.stamped { border-style: solid; border-color: transparent; cursor: default; }
  .stamp-mark {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 2.5rem; opacity: 0; transform: scale(2.2) rotate(-25deg);
  }
  .stamp-slot.stamped .stamp-mark { animation: thunk 0.45s cubic-bezier(.2,1.5,.4,1) forwards; }
  @keyframes thunk { to { opacity: 1; transform: scale(1) rotate(-10deg); } }

  .all-done-msg {
    text-align: center; font-family: 'Yomogi', cursive; font-size: 1.2rem;
    color: var(--accent-deep); margin-top: 1.1rem; min-height: 1.6rem; line-height: 1.5;
  }
  .all-done-msg .big { font-size: 2rem; display: inline-block; }
  .all-done-msg .big.show { animation: pop 0.65s cubic-bezier(.2,1.7,.4,1) both; }
  @keyframes pop {
    0% { transform: scale(0) rotate(-30deg); }
    70% { transform: scale(1.3) rotate(6deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .reset {
    display: block; margin: 1.4rem auto 0; background: none;
    border: 2px solid #dcccc0; color: #a8978f; border-radius: 14px;
    padding: 0.5rem 1.2rem; font-family: 'Kosugi Maru', sans-serif;
    font-size: 0.85rem; cursor: pointer;
  }
  .reset:active { background: #f2e8de; }
  .reset.armed { border-color: #e05c5c; color: #e05c5c; background: #fff0f0; font-weight: bold; }

  .sparkle { position: fixed; top: -10px; font-size: 1.4rem; z-index: 50; pointer-events: none; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(105vh) rotate(420deg); opacity: 0.85; } }
</style>
</head>
<body class="theme-yui">
<div class="deco" id="deco"></div>

<header>
  <h1>☀️ あさのしたく ☀️</h1>
  <div class="date" id="dateText"></div>
</header>

<div class="tabs">
  <button class="tab yui active" data-kid="yui" onclick="switchKid('yui')">
    <span class="face">🎀</span>ゆいちゃん
  </button>
  <button class="tab mio" data-kid="mio" onclick="switchKid('mio')">
    <span class="face">🎀</span>みおちゃん
  </button>
</div>

<main>
  <div class="board yui" id="board"></div>
  <button class="reset" onclick="resetToday()">きょうのスタンプをリセット</button>
</main>

<script>
  const KIDS = {
    yui: {
      name: "ゆいちゃん", face: "🎀", color: "yui",
      deco: ["🎀","🍓","🌸","💕","🎀","🌷"],
      cheer: "きょうも かわいく いってらっしゃい！"
    },
    mio: {
      name: "みおちゃん", face: "🎀", color: "mio",
      deco: ["🎀","🍓","🌸","💧","🎀","🌷"],
      cheer: "きょうも かわいく いってらっしゃい！"
    }
  };

  // 朝の流れを4つに（顔洗い・歯磨きは外す）
  const MORNING = {
    yui: [
      { id: "ohayou",  emoji: "☀️",  label: "おはよう",     stamp: "🎀" },
      { id: "gohan",   emoji: "🍞",  label: "ごはん",       stamp: "🍓" },
      { id: "kigae",   emoji: "👗",  label: "おきがえ",     stamp: "🌸" },
      { id: "itte",    emoji: "👟",  label: "いってきます", stamp: "💕" }
    ],
    mio: [
      { id: "ohayou",  emoji: "☀️",  label: "おはよう",     stamp: "🎀" },
      { id: "gohan",   emoji: "🍞",  label: "ごはん",       stamp: "🍓" },
      { id: "kigae",   emoji: "👗",  label: "おきがえ",     stamp: "🌸" },
      { id: "itte",    emoji: "👟",  label: "いってきます", stamp: "💕" }
    ]
  };
  const HOME = {
    yui: [ { id: "tadaima", emoji: "🏠", label: "ただいま", stamp: "🌷" } ],
    mio: [ { id: "tadaima", emoji: "🏠", label: "ただいま", stamp: "🌷" } ]
  };

  let currentKid = "yui";

  function todayKey() {
    const d = new Date();
    return `shitaku_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }
  function loadData() {
    try { const raw = localStorage.getItem(todayKey()); return raw ? JSON.parse(raw) : {}; }
    catch(e) { return {}; }
  }
  function saveData(data) { try { localStorage.setItem(todayKey(), JSON.stringify(data)); } catch(e) {} }

  function showDate() {
    const d = new Date();
    const days = ["にち","げつ","か","すい","もく","きん","ど"];
    document.getElementById("dateText").textContent =
      `${d.getMonth()+1}がつ ${d.getDate()}にち（${days[d.getDay()]}）`;
  }

  function renderDeco() {
    const kid = KIDS[currentKid];
    const positions = [
      {top:"6%",left:"6%"},{top:"14%",right:"8%"},{top:"44%",left:"4%"},
      {top:"54%",right:"6%"},{top:"82%",left:"10%"},{top:"88%",right:"12%"}
    ];
    document.getElementById("deco").innerHTML = kid.deco.map((e,i) => {
      const p = positions[i] || {top:"50%",left:"50%"};
      const style = Object.entries(p).map(([k,v])=>`${k}:${v}`).join(";");
      return `<span style="${style}; animation-delay:${-i*0.8}s">${e}</span>`;
    }).join("");
  }

  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return null; }
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  // ポン！＝コインぴょこん（マリオコイン風 B5→E6）
  function playPop() {
    const ctx = getAudio();
    if (!ctx) return;
    const mk = (freq, start, dur, vol) => {
      const t = ctx.currentTime + start;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "square";
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + dur + 0.02);
    };
    mk(988, 0, 0.09, 0.22);
    mk(1319, 0.08, 0.5, 0.22);
  }

  // 全部そろった時（コインぴょこん系のファンファーレ）
  function playFanfare() {
    const ctx = getAudio();
    if (!ctx) return;
    const notes = [784, 1047, 1319, 1568]; // ソドミソ（高め）
    notes.forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.1;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.42);
    });
  }

  function switchKid(kid) {
    currentKid = kid;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.kid === kid));
    document.body.className = "theme-" + kid;
    renderDeco();
    render();
  }

  function taskHTML(t, isHome) {
    const kidData = loadData()[currentKid] || {};
    const stamped = !!kidData[t.id];
    return `
      <div class="task ${stamped ? 'done' : ''}">
        <div class="task-label">
          <span class="emoji">${t.emoji}</span>
          <div class="name">${t.label}</div>
        </div>
        <div class="stamp-slot ${stamped ? 'stamped' : ''}" onclick="stamp('${t.id}', ${isHome})">
          ${stamped ? `<span class="stamp-mark">${t.stamp}</span>` : `<span class="hint">ここを<br>ぽん！</span>`}
        </div>
      </div>`;
  }

  function render() {
    const kid = KIDS[currentKid];
    const kidData = loadData()[currentKid] || {};
    const morning = MORNING[currentKid];
    const home = HOME[currentKid];
    const board = document.getElementById("board");
    board.className = "board " + kid.color;

    const done = morning.filter(t => kidData[t.id]).length;
    const allDone = done === morning.length;

    let html = `<div class="greeting"><span class="badge">${kid.face}</span><br>${kid.name}、おはよう！</div>`;
    html += `<div class="count-line">
      きょうの したく ${done} / ${morning.length}
      <div class="meter"><div class="fill" style="width:${done/morning.length*100}%"></div></div>
    </div>`;

    html += `<div class="section-title">🌅 あさのしたく</div>`;
    morning.forEach(t => html += taskHTML(t, false));

    if (allDone) {
      html += `<div class="all-done-msg"><span class="big show">🌟</span><br>ぜんぶ できたね！<br>${kid.cheer}</div>`;
    }

    html += `<div class="section-title home">🏠 おうちに かえったら</div>`;
    home.forEach(t => html += taskHTML(t, true));

    board.innerHTML = html;
  }

  function stamp(taskId, isHome) {
    const data = loadData();
    if (!data[currentKid]) data[currentKid] = {};
    if (data[currentKid][taskId]) return;
    data[currentKid][taskId] = true;
    saveData(data);

    const morning = MORNING[currentKid];
    const becameAllDone = !isHome && morning.every(t => data[currentKid][t.id]);
    render();
    if (becameAllDone || isHome) {
      playFanfare();
      sparkle();
    } else {
      playPop();
    }
  }

  function sparkle() {
    const kid = KIDS[currentKid];
    for (let i = 0; i < 26; i++) {
      const c = document.createElement("div");
      c.className = "sparkle";
      c.textContent = kid.deco[Math.floor(Math.random()*kid.deco.length)];
      c.style.left = Math.random()*100 + "vw";
      c.style.animationDuration = (2 + Math.random()*2) + "s";
      c.style.animationDelay = (Math.random()*0.5) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }
  }

  let resetArmed = false;
  let resetTimer = null;
  function resetToday() {
    const btn = document.querySelector(".reset");
    if (!resetArmed) {
      resetArmed = true;
      btn.textContent = "もういちど おすと けします";
      btn.classList.add("armed");
      resetTimer = setTimeout(() => {
        resetArmed = false;
        btn.textContent = "きょうのスタンプをリセット";
        btn.classList.remove("armed");
      }, 3000);
      return;
    }
    clearTimeout(resetTimer);
    resetArmed = false;
    localStorage.removeItem(todayKey());
    btn.textContent = "きょうのスタンプをリセット";
    btn.classList.remove("armed");
    render();
  }

  showDate();
  renderDeco();
  render();
</script>
</body>
</html>
