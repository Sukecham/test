<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rx-TYPE ～Do処方殲滅作戦～</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  canvas{display:block;position:absolute;top:0;left:0}
  #titleScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:10;padding-top:calc(env(safe-area-inset-top,16px) + 5vh)}
  #titleScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(0,100,180,.15) 0%,rgba(0,0,0,.98) 60%)}
  .tl{position:relative;z-index:1;text-align:center;margin-bottom:2vh}
  .tl h1{font-family:'Press Start 2P',monospace;font-size:clamp(30px,8.5vw,48px);color:#00ffa8;text-shadow:0 0 30px #00ffa8,0 0 80px rgba(0,255,168,.3),0 4px 0 #006644;letter-spacing:3px}
  .tl .sub{font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(11px,2.8vw,16px);color:#ffcc44;margin-top:8px;letter-spacing:2px;font-weight:700}
  .ca{position:relative;z-index:1;margin:1.5vh 0;animation:cf 2s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(0,255,168,.4))}
  .ca canvas{display:block}
  @keyframes cf{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .sb{position:relative;z-index:1;font-family:'Press Start 2P',monospace;font-size:clamp(11px,2.8vw,15px);color:#060620;background:linear-gradient(135deg,#00ffa8,#00cc88);border:none;padding:13px 32px;border-radius:50px;cursor:pointer;box-shadow:0 0 40px rgba(0,255,168,.3);animation:bp 1.8s ease-in-out infinite;-webkit-tap-highlight-color:transparent;margin-top:1.5vh}
  @keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .sb:active{transform:scale(.94)!important}
  .inst{position:relative;z-index:1;font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(9px,2.1vw,12px);color:rgba(120,160,200,.55);text-align:center;margin-top:1.5vh;line-height:2.1}
  .inst b{color:rgba(0,255,168,.65)}
  .credit{position:relative;z-index:1;margin-top:auto;padding-bottom:calc(env(safe-area-inset-bottom,8px) + 8px);font-family:'DotGothic16',monospace;font-size:7px;color:rgba(100,130,170,.18)}
  #hud{position:absolute;top:env(safe-area-inset-top,0);left:0;right:0;padding:5px 10px;display:none;justify-content:space-between;align-items:center;z-index:5;pointer-events:none}
  .hi{font-family:'DotGothic16',monospace;font-size:clamp(9px,2.2vw,12px)}
  .hs{color:#00ffa8}.hw{color:#66bbdd}.hl{color:#ff6688}
  #chargeBar{position:absolute;bottom:calc(env(safe-area-inset-bottom,8px) + 68px);left:10px;width:clamp(50px,14vw,70px);height:5px;background:rgba(255,255,255,.1);border-radius:3px;z-index:5;pointer-events:none;display:none}
  #chargeFill{width:0%;height:100%;background:linear-gradient(90deg,#00ffa8,#ffcc44,#ff4444);border-radius:3px;transition:width .05s}
  #itemInfo{position:absolute;top:calc(env(safe-area-inset-top,0) + 24px);left:0;right:0;text-align:center;z-index:6;display:none;pointer-events:none;font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(10px,2.5vw,13px);color:#ffcc44;text-shadow:0 0 10px rgba(255,204,68,.5)}
  #lvUpBanner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);z-index:7;pointer-events:none;display:none;font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,24px);color:#ffcc44;text-shadow:0 0 20px rgba(255,204,68,.6)}
  #gameOver{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.93);z-index:10}
  #gameOver.show{display:flex;animation:fi .4s ease}
  @keyframes fi{from{opacity:0}to{opacity:1}}
  #gameOver h2{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,24px);color:#ff4466;margin-bottom:4px}
  #gameOver .gs{font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(10px,2.5vw,14px);color:#ff8899;margin-bottom:14px}
  #gameOver .fs{font-family:'DotGothic16',monospace;font-size:clamp(13px,3.2vw,18px);color:#00ffa8;margin-bottom:8px}
  #gameOver .quip{font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(10px,2.5vw,14px);color:#66bbdd;margin-bottom:22px;text-align:center;padding:0 24px;line-height:1.6}
  #wb{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);z-index:8;pointer-events:none;display:none;flex-direction:column;align-items:center}
  #wb.show{display:flex;animation:wi .5s ease}
  @keyframes wi{0%{opacity:0;transform:translate(-50%,-50%) scale(2)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  .wn{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4.5vw,26px);color:#00ffa8;text-shadow:0 0 40px rgba(0,255,168,.6)}
  .wt{font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(11px,2.8vw,16px);color:#ffcc44;margin-top:6px;font-weight:700}
  #moveArea{position:absolute;left:0;top:0;width:50%;height:100%;z-index:4}
  #fireArea{position:absolute;right:0;top:0;width:50%;height:100%;z-index:4}
  /* Ending */
  #ending{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:15;overflow:hidden;padding:20px}
  #ending.show{display:flex}
  #endText{font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(12px,3vw,18px);color:#ccddee;text-align:center;line-height:2.2;max-width:90vw;white-space:pre-wrap}
  #endText .em{color:#00ffa8;font-weight:700}
  #endText .red{color:#ff4466;font-weight:700}
  #endText .gold{color:#ffcc44;font-weight:700}
  #endText .big{font-size:1.4em;display:block;margin:8px 0}
  #endText .small{font-size:.75em;color:rgba(150,170,200,.5)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <div class="hi hs">SCORE <span id="sD">0</span></div>
  <div class="hi hw">STAGE <span id="wD">1</span></div>
  <div class="hi hl"><span id="lD">♥♥♥</span></div>
</div>
<div id="chargeBar"><div id="chargeFill"></div></div>
<div id="itemInfo"></div>
<div id="lvUpBanner"></div>
<div id="moveArea"></div>
<div id="fireArea"></div>
<div id="wb"><div class="wn" id="wbN"></div><div class="wt" id="wbT"></div></div>
<div id="titleScreen">
  <div class="tl"><h1>Rx-TYPE</h1><div class="sub">～ Do処方殲滅作戦 ～</div></div>
  <div class="ca" id="tChar"></div>
  <button class="sb" id="startBtn">▶ 調剤開始</button>
  <div class="inst"><b>左半分ドラッグ</b> → 移動<br><b>右半分タップ</b> → ショット<br><b>右半分長押し→離す</b> → チャージ波動砲<br>同じアイテム重複取得で<b>3段階強化</b>！<br><span style="color:rgba(100,140,180,.3);font-size:.85em">※ 用法用量を守って正しくお使いください</span></div>
  <div class="credit">© 20XX PHARMACY ARCADE DIVISION</div>
</div>
<div id="gameOver">
  <h2>PRESCRIPTION</h2><div class="gs">– EXPIRED –</div>
  <div class="fs">SCORE: <span id="fS">0</span></div>
  <div class="quip" id="goQ"></div>
  <button class="sb" id="retryBtn">再調剤</button>
</div>
<div id="ending"><div id="endText"></div></div>
<script>
const cv=document.getElementById('cv'),c=cv.getContext('2d');
function resize(){const d=window.devicePixelRatio||1,w=window.innerWidth,h=window.innerHeight;cv.style.width=w+'px';cv.style.height=h+'px';cv.width=w*d;cv.height=h*d;c.setTransform(d,0,0,d,0,0);}
resize();window.addEventListener('resize',resize);
const W=()=>window.innerWidth,H=()=>window.innerHeight;

// ===== AUDIO =====
const AC=window.AudioContext||window.webkitAudioContext;let ax;
function iA(){if(!ax)ax=new AC();}
function tone(f,d,t=‘square’,v=.05){if(!ax)return;try{const o=ax.createOscillator(),g=ax.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+d);o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+d);}catch(e){}}
function noise(d,v=.03){if(!ax)return;try{const n=ax.createBufferSource(),buf=ax.createBuffer(1,ax.sampleRate*d,ax.sampleRate),dt=buf.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;n.buffer=buf;const g=ax.createGain();g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+d);n.connect(g);g.connect(ax.destination);n.start();n.stop(ax.currentTime+d);}catch(e){}}
const SFX={
shoot:()=>{tone(1100,.04,‘square’,.04);},
charge:()=>{tone(220,.08,‘sine’,.03);},
chargeShot:()=>{tone(150,.3,‘sawtooth’,.07);noise(.15,.04);},
hit:()=>{tone(200,.08,‘sawtooth’,.04);},
kill:()=>{tone(500,.04);setTimeout(()=>tone(700,.06,‘sine’,.03),30);},
pu:()=>{tone(523,.07,‘sine’,.05);setTimeout(()=>tone(659,.07,‘sine’,.05),60);setTimeout(()=>tone(784,.1,‘sine’,.06),120);},
lvup:()=>{[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.08,‘sine’,.05),i*60));},
dmg:()=>{tone(80,.3,‘sawtooth’,.07);noise(.2,.04);},
boss:()=>{tone(100,.5,‘sawtooth’,.04);tone(150,.4,‘square’,.03);},
bomb:()=>{noise(.4,.06);tone(60,.5,‘sawtooth’,.06);},
heal:()=>{tone(600,.1,‘sine’,.05);setTimeout(()=>tone(800,.1,‘sine’,.05),80);setTimeout(()=>tone(1000,.12,‘sine’,.06),160);},
laser:()=>{tone(300,.15,‘sawtooth’,.04);tone(500,.1,‘sine’,.03);},
wave:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.08,‘sine’,.04),i*80));},
go:()=>{[400,350,300,200].forEach((f,i)=>setTimeout(()=>tone(f,.15,‘sawtooth’,.05),i*160));},
clear:()=>{[523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>tone(f,.15,‘sine’,.06),i*120));},
};

// ===== SPRITES =====
const SP={};
function mkSp(k,w,h,fn){const o=document.createElement(‘canvas’);o.width=w*2;o.height=h*2;const x=o.getContext(‘2d’);x.scale(2,2);fn(x);SP[k]=o;}
function dS(k,x,y,w,h,a=1){const s=SP[k];if(!s)return;c.globalAlpha=a;c.drawImage(s,x-w/2,y-h/2,w,h);c.globalAlpha=1;}

// === PLAYER SHIP ===
mkSp(‘ship’,56,32,(x)=>{
const bg=x.createLinearGradient(0,4,0,28);bg.addColorStop(0,’#fff’);bg.addColorStop(.5,’#ddeeff’);bg.addColorStop(1,’#aaccee’);
x.fillStyle=bg;x.beginPath();x.moveTo(8,6);x.lineTo(42,6);x.quadraticCurveTo(54,16,42,26);x.lineTo(8,26);x.quadraticCurveTo(2,16,8,6);x.fill();x.strokeStyle=’#88aacc’;x.lineWidth=.6;x.stroke();
const wg=x.createRadialGradient(22,16,1,22,16,8);wg.addColorStop(0,’#aaddff’);wg.addColorStop(1,’#4488cc’);
x.fillStyle=wg;x.beginPath();x.ellipse(22,16,7,5,0,0,Math.PI*2);x.fill();x.strokeStyle=’#336699’;x.lineWidth=.5;x.stroke();
x.fillStyle=’#fde8d0’;x.beginPath();x.arc(22,15,3,0,Math.PI*2);x.fill();
x.fillStyle=’#222’;x.beginPath();x.arc(23.2,14.5,.6,0,Math.PI*2);x.fill();x.beginPath();x.arc(23.2,15.8,.6,0,Math.PI*2);x.fill();
x.strokeStyle=’#334’;x.lineWidth=.4;x.beginPath();x.roundRect(22,13.5,2.8,1.6,.6);x.stroke();x.beginPath();x.roundRect(22,15,2.8,1.6,.6);x.stroke();
x.fillStyle=’#22aa66’;x.fillRect(34,14,6,4);x.fillRect(36,12,2,8);
x.fillStyle=‘rgba(0,180,255,.3)’;x.beginPath();x.ellipse(4,16,3,6,0,0,Math.PI*2);x.fill();
x.fillStyle=’#ccddee’;x.beginPath();x.moveTo(14,6);x.lineTo(20,0);x.lineTo(28,0);x.lineTo(22,6);x.fill();
x.beginPath();x.moveTo(14,26);x.lineTo(20,32);x.lineTo(28,32);x.lineTo(22,26);x.fill();
x.fillStyle=‘rgba(0,80,160,.15)’;x.font=‘bold 6px serif’;x.textAlign=‘center’;x.fillText(‘Rx’,30,19);
x.fillStyle=’#88aacc’;x.beginPath();x.moveTo(48,12);x.lineTo(56,14);x.lineTo(56,18);x.lineTo(48,20);x.fill();
});

// === FORCE ===
mkSp(‘force’,24,24,(x)=>{
const fg=x.createRadialGradient(12,12,2,12,12,11);fg.addColorStop(0,’#ffeecc’);fg.addColorStop(1,’#cc8844’);
x.fillStyle=fg;x.beginPath();x.arc(12,12,10,0,Math.PI*2);x.fill();x.strokeStyle=’#aa6622’;x.lineWidth=1;x.stroke();
x.fillStyle=’#fff8ee’;x.beginPath();x.roundRect(5,5,14,14,2);x.fill();
x.fillStyle=’#cc8844’;x.beginPath();x.roundRect(4,5,3,14,1);x.fill();
x.fillStyle=’#774422’;x.font=‘bold 3.5px sans-serif’;x.textAlign=‘center’;x.fillText(‘お薬’,12,11);x.fillText(‘手帳’,12,16);
});

// === ENEMIES ===
mkSp(‘mrsa’,40,40,(x)=>{
const g=x.createRadialGradient(20,18,2,20,20,16);g.addColorStop(0,’#aaff66’);g.addColorStop(1,’#2a7700’);
x.fillStyle=g;x.beginPath();x.arc(20,20,14,0,Math.PI*2);x.fill();
x.strokeStyle=’#55bb22’;x.lineWidth=1;x.setLineDash([2,1.5]);x.stroke();x.setLineDash([]);
[[7,16,2,10,4,5],[8,28,3,33,5,38],[33,12,38,7,36,2],[34,27,39,33,37,38]].forEach(([x1,y1,cx,cy,x2,y2])=>{x.strokeStyle=’#66cc22’;x.lineWidth=1.5;x.lineCap=‘round’;x.beginPath();x.moveTo(x1,y1);x.quadraticCurveTo(cx,cy,x2,y2);x.stroke();});
x.fillStyle=’#0a3300’;x.beginPath();x.arc(16,18,2.5,0,Math.PI*2);x.fill();x.beginPath();x.arc(24,18,2.5,0,Math.PI*2);x.fill();
x.fillStyle=’#aaff66’;x.beginPath();x.arc(16.6,17.3,.7,0,Math.PI*2);x.fill();x.beginPath();x.arc(24.6,17.3,.7,0,Math.PI*2);x.fill();
x.strokeStyle=’#0a3300’;x.lineWidth=1;x.beginPath();x.moveTo(15,24);x.quadraticCurveTo(20,28,25,24);x.stroke();
});
mkSp(‘virus’,40,40,(x)=>{
const g=x.createRadialGradient(20,18,2,20,20,11);g.addColorStop(0,’#ff77bb’);g.addColorStop(1,’#992255’);
x.fillStyle=g;x.beginPath();x.arc(20,20,10,0,Math.PI*2);x.fill();
for(let a=0;a<360;a+=30){const r=a*Math.PI/180;x.strokeStyle=’#cc4488’;x.lineWidth=1.5;x.lineCap=‘round’;x.beginPath();x.moveTo(20+Math.cos(r)*10,20+Math.sin(r)*10);x.lineTo(20+Math.cos(r)*16,20+Math.sin(r)*16);x.stroke();x.fillStyle=’#ff99cc’;x.beginPath();x.arc(20+Math.cos(r)*16,20+Math.sin(r)*16,2,0,Math.PI*2);x.fill();}
x.fillStyle=’#330016’;x.beginPath();x.arc(17,19,2,0,Math.PI*2);x.fill();x.beginPath();x.arc(23,19,2,0,Math.PI*2);x.fill();
});
mkSp(‘poly’,44,36,(x)=>{
const g=x.createRadialGradient(22,16,3,22,18,18);g.addColorStop(0,’#ffbb55’);g.addColorStop(1,’#aa5500’);
x.fillStyle=g;x.beginPath();x.ellipse(22,18,20,14,0,0,Math.PI*2);x.fill();
[[8,14,5,3,’#ff3344’,-15],[24,10,5,3,’#3388ff’,10],[14,22,5,3,’#33cc55’,-8],[28,22,4,3,’#ffcc00’,20]].forEach(([px,py,pw,ph,col,rot])=>{x.save();x.translate(px,py);x.rotate(rot*Math.PI/180);x.fillStyle=col;x.beginPath();x.roundRect(-pw/2,-ph/2,pw,ph,1.5);x.fill();x.restore();});
x.fillStyle=’#442200’;x.beginPath();x.arc(17,17,1.8,0,Math.PI*2);x.fill();x.beginPath();x.arc(25,17,1.8,0,Math.PI*2);x.fill();
x.fillStyle=’#ff3344’;x.font=‘bold 5px monospace’;x.textAlign=‘center’;x.fillText(‘6+’,22,8);
});
mkSp(‘kinki’,40,40,(x)=>{
const g=x.createRadialGradient(20,18,2,20,20,16);g.addColorStop(0,’#ff5555’);g.addColorStop(1,’#770000’);
x.fillStyle=g;x.beginPath();x.arc(20,20,15,0,Math.PI*2);x.fill();
x.strokeStyle=’#ff2222’;x.lineWidth=2;x.beginPath();x.arc(20,20,13,0,Math.PI*2);x.stroke();x.lineWidth=2.5;x.beginPath();x.moveTo(11,11);x.lineTo(29,29);x.stroke();
});

// === 5 BOSSES ===
function drawBoss(x,col1,col2,label,decorFn){
const g=x.createRadialGradient(50,45,5,50,50,40);g.addColorStop(0,col1);g.addColorStop(1,col2);
x.fillStyle=g;x.beginPath();x.arc(50,50,38,0,Math.PI*2);x.fill();
x.strokeStyle=col1+‘aa’;x.lineWidth=2;x.setLineDash([4,3]);x.stroke();x.setLineDash([]);
x.fillStyle=col2;x.beginPath();x.moveTo(5,35);x.lineTo(15,25);x.lineTo(15,75);x.lineTo(5,65);x.fill();
x.beginPath();x.moveTo(95,35);x.lineTo(85,25);x.lineTo(85,75);x.lineTo(95,65);x.fill();
decorFn(x);
x.fillStyle=‘rgba(255,255,255,.35)’;x.font=‘bold 5px sans-serif’;x.textAlign=‘center’;x.fillText(label,50,90);
}
// Boss 1: 超耐性MRSA
mkSp(‘boss1’,100,100,(x)=>{
drawBoss(x,’#88ff44’,’#1a5500’,‘超耐性MRSA’,(x)=>{
// Multiple flagella
for(let i=0;i<8;i++){const a=Math.PI*2*i/8;x.strokeStyle=’#66cc22’;x.lineWidth=2;x.lineCap=‘round’;
x.beginPath();x.moveTo(50+Math.cos(a)*35,50+Math.sin(a)*35);x.quadraticCurveTo(50+Math.cos(a+.3)*50,50+Math.sin(a+.3)*50,50+Math.cos(a)*48,50+Math.sin(a)*48);x.stroke();}
x.fillStyle=’#0a3300’;x.beginPath();x.arc(40,42,5,0,Math.PI*2);x.fill();x.beginPath();x.arc(60,42,5,0,Math.PI*2);x.fill();
x.fillStyle=’#aaff66’;x.beginPath();x.arc(41.5,40.5,2,0,Math.PI*2);x.fill();x.beginPath();x.arc(61.5,40.5,2,0,Math.PI*2);x.fill();
x.strokeStyle=’#0a3300’;x.lineWidth=1.5;x.beginPath();x.moveTo(38,55);x.quadraticCurveTo(50,65,62,55);x.stroke();
x.fillStyle=’#ffff44’;x.font=‘bold 7px monospace’;x.textAlign=‘center’;x.fillText(‘VRE+’,50,35);
});
});
// Boss 2: レセコン暴走AI
mkSp(‘boss2’,100,100,(x)=>{
drawBoss(x,’#4488ff’,’#112255’,‘レセコン暴走AI’,(x)=>{
x.fillStyle=’#223366’;x.beginPath();x.roundRect(28,25,44,35,4);x.fill();x.strokeStyle=’#4488ff’;x.lineWidth=1;x.stroke();
x.fillStyle=’#112244’;x.beginPath();x.roundRect(32,28,36,22,2);x.fill();
x.fillStyle=’#ff4444’;x.font=‘bold 6px monospace’;x.fillText(‘ERROR’,50,38);x.fillText(‘E-4019’,50,46);
x.fillStyle=’#44aaff’;x.font=‘4px monospace’;[[32,55,8],[40,55,6],[48,55,8],[58,55,6],[66,55,4]].forEach(([bx,by,bw])=>{x.fillRect(bx,by,bw,4);});
x.fillStyle=’#ff4444’;x.beginPath();x.arc(38,38,3.5,0,Math.PI*2);x.fill();x.beginPath();x.arc(62,38,3.5,0,Math.PI*2);x.fill();
x.fillStyle=’#ff8888’;x.beginPath();x.arc(38.8,37,.8,0,Math.PI*2);x.fill();x.beginPath();x.arc(62.8,37,.8,0,Math.PI*2);x.fill();
});

// ===== WAVES =====
function makeWave(type,count,pattern,delay){
const waves=[];
for(let i=0;i<count;i++){
const et=ET[type];let wy;
switch(pattern){
case’line’:wy=H()*.15+i*(H()*.6/(count-1||1));break;
case’sin’:wy=H()/2;break;case’top’:wy=H()*.15+i*20;break;case’bot’:wy=H()*.6+i*20;break;
default:wy=H()*.1+Math.random()*H()*.7;
}
waves.push({time:delay+i*280,type:et,x:W()+30,y:wy,vx:-2.2-stage*.15,vy:0,pattern,phaseOff:i*.8});
}return waves;
}
function genStageWaves(stg){
let q=[],t=2000;const wc=3+stg*2;
for(let w=0;w<wc;w++){
const eType=Math.min(Math.floor(Math.random()*(1+stg*.4)),ET.length-1);
const cnt=3+Math.floor(Math.random()*3);
const pats=[‘line’,‘sin’,‘top’,‘bot’,‘random’];
q=q.concat(makeWave(eType,cnt,pats[Math.floor(Math.random()*pats.length)],t));
t+=2500+Math.random()*1500;
if(w===2||w===5||w===8){const pu=PUT[Math.floor(Math.random()*PUT.length)];q.push({time:t-1200,isPU:true,type:pu,x:W()+20,y:H()*.25+Math.random()*H()*.5,vx:-1.5,vy:0});}
}
q.push({time:t+1500,isBoss:true});return q;
}

if(pl.inv&&now<pl.inv){c.strokeStyle=`rgba(0,255,168,${.15+Math.sin(fr*.1)*.08})`;c.lineWidth=1.5;c.beginPath();c.arc(pl.x,pl.y,pl.w/2+6,0,Math.PI*2);c.stroke();}
}

function rEns(){for(const e of ens){if(!e.alive)continue;c.save();c.shadowColor=e.type.col;c.shadowBlur=6;dS(e.type.key,e.x,e.y,e.w,e.h);c.restore();
if(e.mhp>2){const bw=e.w*.7,bh=2.5,bx=e.x-bw/2,by=e.y+e.h/2+3;c.fillStyle=‘rgba(0,0,0,.4)’;c.fillRect(bx-1,by-1,bw+2,bh+2);c.fillStyle=’#222’;c.fillRect(bx,by,bw,bh);c.fillStyle=e.type.col;c.fillRect(bx,by,bw*(e.hp/e.mhp),bh);}}}

function rBoss(){if(!bossActive||!bossObj)return;
c.save();if(bossObj.flashTimer>0)c.globalAlpha=.5+Math.sin(fr*.5)*.3;
c.shadowColor=’#8844ff’;c.shadowBlur=25;dS(bossObj.key,bossObj.x,bossObj.y,bossObj.w,bossObj.h);c.restore();
const bw=80,bh=5,bx=bossObj.x-bw/2,by=bossObj.y-bossObj.h/2-14;
c.fillStyle=‘rgba(0,0,0,.5)’;c.fillRect(bx-1,by-1,bw+2,bh+2);c.fillStyle=’#333’;c.fillRect(bx,by,bw,bh);
c.fillStyle=’#aa44ff’;c.fillRect(bx,by,bw*(bossObj.hp/bossObj.mhp),bh);
c.fillStyle=‘rgba(255,255,255,.5)’;c.font=“bold 8px ‘DotGothic16’,monospace”;c.textAlign=‘center’;c.fillText(bossObj.name,bossObj.x,by-4);}

function rBuls(){for(const b of buls){if(b.homing){c.save();c.shadowColor=’#ffaa44’;c.shadowBlur=6;const a=Math.atan2(b.vy,b.vx);c.translate(b.x,b.y);c.rotate(a);
c.fillStyle=’#ffcc44’;c.beginPath();c.moveTo(7,0);c.lineTo(-5,-4);c.lineTo(-5,4);c.closePath();c.fill();
c.fillStyle=’#ff6622’;c.beginPath();c.moveTo(-5,0);c.lineTo(-9,-2);c.lineTo(-9,2);c.closePath();c.fill();c.restore();}
else{c.save();c.shadowColor=’#00ffa8’;c.shadowBlur=4;dS(b.type,b.x,b.y,b.w,b.h);c.restore();}}
for(const b of ebs){c.save();c.shadowColor=’#ff4444’;c.shadowBlur=4;dS(‘ebul’,b.x,b.y,8,4);c.restore();}}

function rPUs(){for(const p of pus){const bob=Math.sin(p.bp)*4;const gs=15+Math.sin(fr*.1)*3;
c.save();c.shadowColor=’#fff’;c.shadowBlur=10;c.strokeStyle=‘rgba(255,255,255,.2)’;c.lineWidth=1.2;c.beginPath();c.arc(p.x,p.y+bob,gs,0,Math.PI*2);c.stroke();
c.strokeStyle=‘rgba(255,255,255,.12)’;c.setLineDash([4,5]);c.beginPath();c.arc(p.x,p.y+bob,gs-3,fr*.05,fr*.05+Math.PI*1.5);c.stroke();c.setLineDash([]);c.restore();
const pu=.9+Math.sin(fr*.1)*.15;dS(p.type.key,p.x,p.y+bob,p.w*pu,p.h*pu);
// Show level indicator
const lv=pl.lv[p.type.ef]||0;if(lv>0){c.fillStyle=’#ffcc44’;c.font=“bold 7px ‘DotGothic16’”;c.textAlign=‘center’;c.fillText(`Lv${lv+1}`,p.x,p.y+bob-16);}}}

function rParts(){for(const p of parts){c.globalAlpha=p.life;c.fillStyle=p.col;c.beginPath();c.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);c.fill();}c.globalAlpha=1;}
function rPops(){for(const p of pops){c.globalAlpha=p.life;c.font=“bold 11px ‘DotGothic16’,monospace”;c.fillStyle=p.col;c.textAlign=‘center’;c.fillText(p.text,p.x,p.y);}c.globalAlpha=1;}

function loop(){update();render();requestAnimationFrame(loop);}loop();
document.getElementById(‘startBtn’).addEventListener(‘click’,()=>{iA();startGame();});
document.getElementById(‘retryBtn’).addEventListener(‘click’,()=>{iA();startGame();});
</script>
