<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>パパの声でおしたく MVP</title>
  <style>
    :root {
      --blue: #1558c8;
      --deep-blue: #06327a;
      --sky-bg: #e2f4ff;
      --sky-border: #b7def8;
      --pink-bg: #ffe3ed;
      --pink-border: #f8b4cf;
      --yellow-bg: #fff4bd;
      --yellow-border: #f8d456;
      --green-bg: #e4f8da;
      --green-border: #b8e49e;
      --purple-bg: #efe2ff;
      --purple-border: #d8b4fe;
      --orange-bg: #ffedd5;
      --orange-border: #fdba74;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #e5e7eb;
      color: #172033;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: rgba(255,255,255,0.96);
      position: relative;
      overflow-x: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.18);
    }

    .header {
      padding: calc(env(safe-area-inset-top) + 28px) 18px 22px;
      position: relative;
      overflow: hidden;
      transition: background 0.35s ease, color 0.35s ease;
      cursor: pointer;
    }

    .header.morning {
      background: linear-gradient(180deg, #bdeeff 0%, #ecfbff 100%);
      color: #0b3d91;
    }

    .header.afternoon {
      background: linear-gradient(180deg, #172554 0%, #312e81 52%, #111827 100%);
      color: #fff;
    }

    .sky-icon {
      position: absolute;
      font-size: 42px;
      opacity: 0.95;
      pointer-events: none;
    }

    .sky-icon.left { left: 18px; top: 86px; }
    .sky-icon.right { right: 12px; top: 118px; font-size: 34px; opacity: 0.75; }

    .clock-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    .time-block { min-width: 0; padding-top: 30px; }

    .period {
      font-size: 36px;
      line-height: 1;
      font-weight: 1000;
      letter-spacing: 0.04em;
      text-shadow: 0 3px 0 rgba(255,255,255,0.75);
    }

    .afternoon .period { text-shadow: none; }

    .digital-time {
      margin-top: 8px;
      font-size: clamp(62px, 18vw, 82px);
      line-height: 0.92;
      font-weight: 1000;
      letter-spacing: -0.07em;
      color: #0b48a5;
      text-shadow: 0 4px 0 rgba(255,255,255,0.8);
    }

    .afternoon .digital-time { color: #fff; text-shadow: 0 4px 12px rgba(0,0,0,0.35); }

    .message-card {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.9);
      color: #11408d;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
    }

    .afternoon .message-card { background: rgba(255,255,255,0.14); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

    .analog-clock {
      width: 174px;
      height: 174px;
      border-radius: 50%;
      background: #fff;
      border: 7px solid #73b7ea;
      box-shadow: inset 0 2px 12px rgba(0,0,0,0.08), 0 8px 18px rgba(13, 64, 132, 0.16);
      position: relative;
      flex: 0 0 174px;
    }

    .number {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 21px;
      font-weight: 1000;
      color: #111827;
      line-height: 1;
    }

    .tick {
      position: absolute;
      left: 50%; top: 50%;
      transform-origin: 0 0;
      background: #9ca3af;
      width: 1px; height: 5px;
    }

    .tick.major { width: 2px; height: 9px; background: #111827; }

    .hand {
      position: absolute;
      left: 50%; top: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
    }

    .hand.hour { width: 10px; height: 58px; margin-left: -5px; margin-top: -58px; background: #222; z-index: 4; }
    .hand.minute { width: 7px; height: 78px; margin-left: -3.5px; margin-top: -78px; background: #ef1b1b; box-shadow: 0 2px 6px rgba(239,27,27,.35); z-index: 5; }
    .center-dot { position:absolute; left:50%; top:50%; width:24px; height:24px; transform:translate(-50%,-50%); background:#ef1b1b; border:3px solid #ff7777; border-radius:50%; z-index:8; box-shadow:0 2px 8px rgba(0,0,0,.22); }

    .content { padding: 16px 14px 22px; }

    h1 { margin: 0 0 12px; font-size: 24px; color:#083985; font-weight:1000; display:flex; align-items:center; gap:8px; }

    .tabs { display:flex; gap:8px; overflow-x:auto; padding:2px 0 12px; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { flex:0 0 auto; border:1px solid #dbeafe; background:#fff; color:#1558c8; border-radius:14px; padding:9px 11px; font-size:14px; font-weight:1000; box-shadow:0 3px 10px rgba(15,23,42,.08); cursor:pointer; }
    .tab.active { background:#2563eb; color:#fff; border-color:#2563eb; }

    .mode-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .mode-btn { border:0; border-radius:18px; padding:14px 8px; font-size:17px; font-weight:1000; background:#fff; box-shadow:var(--shadow); color:#334155; cursor:pointer; }
    .mode-btn.active.queue { background:#22c55e; color:#fff; }
    .mode-btn.active.instant { background:#fb923c; color:#fff; }

    .button-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

    .voice-card {
      min-height: 104px;
      border-radius: 20px;
      border: 2px solid transparent;
      padding: 8px 6px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      text-align:center;
      box-shadow:0 4px 12px rgba(15,23,42,.08);
      cursor:pointer;
      user-select:none;
      transition:transform .08s ease, filter .15s ease;
      font-weight:1000;
      position:relative;
    }
    .voice-card:active { transform:scale(.96); filter:brightness(.97); }
    .voice-card .icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; }
    .voice-card svg { width:40px; height:40px; stroke-width:2.5; }
    .voice-card .label { font-size:16px; line-height:1.22; white-space:pre-line; }
    .favorite-toggle { position:absolute; right:7px; top:7px; border:0; background:rgba(255,255,255,.7); border-radius:999px; width:25px; height:25px; color:#94a3b8; font-size:15px; font-weight:1000; }
    .favorite-toggle.on { color:#f59e0b; background:#fff7ed; }

    .pink { background:var(--pink-bg); border-color:var(--pink-border); color:#4a1028; }
    .sky { background:var(--sky-bg); border-color:var(--sky-border); color:#082f49; }
    .green { background:var(--green-bg); border-color:var(--green-border); color:#14532d; }
    .yellow { background:var(--yellow-bg); border-color:var(--yellow-border); color:#713f12; }
    .purple { background:var(--purple-bg); border-color:var(--purple-border); color:#581c87; }
    .orange { background:var(--orange-bg); border-color:var(--orange-border); color:#7c2d12; }

    .queue-panel { margin-top:18px; background:#fff; border:1px solid #e5e7eb; border-radius:24px; box-shadow:var(--shadow); padding:14px; }
    .queue-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .queue-title { font-size:20px; font-weight:1000; color:#083985; }
    .small-btn { border:1px solid #d1d5db; background:#f8fafc; color:#475569; border-radius:13px; padding:8px 10px; font-weight:900; cursor:pointer; }
    .queue-list { min-height:82px; background:#fff1f6; border:1px solid #ffd2e4; border-radius:18px; padding:10px; display:flex; flex-wrap:wrap; align-content:flex-start; gap:8px; }
    .empty { color:#94a3b8; font-weight:900; padding:10px; }
    .chip { display:inline-flex; align-items:center; gap:7px; background:#f9a8d4; color:#831843; border-radius:999px; padding:8px 10px; font-weight:1000; font-size:14px; }
    .chip button { border:0; background:#db2777; color:#fff; width:21px; height:21px; border-radius:50%; font-weight:1000; cursor:pointer; }

    .control-row { margin-top:12px; display:grid; grid-template-columns:1fr 1.25fr 1fr; gap:10px; }
    .control-btn { border:0; border-radius:20px; min-height:68px; color:#fff; font-weight:1000; font-size:17px; box-shadow:var(--shadow); cursor:pointer; }
    .clear { background:#f59e0b; }
    .play { background:#22c55e; font-size:18px; }
    .play:disabled { background:#cbd5e1; }
    .stop { background:#ef4444; }
    .queue-meta { margin-top:10px; text-align:center; color:#64748b; font-size:14px; font-weight:900; }

    @media (max-width: 390px) {
      .analog-clock { width:158px; height:158px; flex-basis:158px; }
      .number { font-size:19px; }
      .digital-time { font-size:66px; }
      .period { font-size:32px; }
      .button-grid { gap:8px; }
      .voice-card { min-height:98px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header id="header" class="header morning" role="button" aria-label="今の時刻を読み上げる">
      <div id="skyLeft" class="sky-icon left">☀️</div>
      <div class="sky-icon right">☁️</div>
      <div class="clock-row">
        <div class="time-block">
          <div id="period" class="period">ごぜん</div>
          <div id="digitalTime" class="digital-time">7:42</div>
          <div class="message-card" id="timeSpeakCard">⏰ いまの じかんを<br />みてみよう！</div>
        </div>
        <div id="analogClock" class="analog-clock" aria-label="アナログ時計">
          <div id="hourHand" class="hand hour"></div>
          <div id="minuteHand" class="hand minute"></div>
          <div class="center-dot"></div>
        </div>
      </div>
    </header>

    <section class="content">
      <h1>🔊 パパのこえをえらぼう</h1>
      <div id="tabs" class="tabs"></div>

      <div class="mode-row">
        <button id="queueMode" class="mode-btn queue active">ならべて再生</button>
        <button id="instantMode" class="mode-btn instant">すぐ鳴らす</button>
      </div>

      <div id="buttonGrid" class="button-grid"></div>

      <div class="queue-panel">
        <div class="queue-head">
          <div class="queue-title">再生リスト（まとめて再生）</div>
          <button id="clearSmall" class="small-btn">🗑 ぜんぶけす</button>
        </div>
        <div id="queueList" class="queue-list"></div>
        <div class="control-row">
          <button id="clearBtn" class="control-btn clear">↻<br />クリア</button>
          <button id="playBtn" class="control-btn play">▶<br />まとめて再生</button>
          <button id="stopBtn" class="control-btn stop">■<br />停止</button>
        </div>
        <div id="queueMeta" class="queue-meta">ぜんぶの長さ 約 0秒（0個）</div>
      </div>
    </section>
  </div>

  <script>
    const iconSvg = {

    const clearSmall = document.getElementById("clearSmall");

    function pad(n) { return String(n).padStart(2, "0"); }
    function displayHour24To12(h) { const v = h % 12; return v === 0 ? 12 : v; }

    function setupClockFace() {
      for (let i = 1; i <= 12; i++) {
        const el = document.createElement("div");
        el.className = "number";
        el.textContent = i;
        const angle = (i * 30 - 90) * Math.PI / 180;
        const r = 70;
        const cx = 87;
        const cy = 87;
        el.style.left = `${cx + r * Math.cos(angle)}px`;
        el.style.top = `${cy + r * Math.sin(angle)}px`;
        analogClock.appendChild(el);
      }
      for (let i = 0; i < 60; i++) {
        const tick = document.createElement("div");
        tick.className = i % 5 === 0 ? "tick major" : "tick";
        tick.style.transform = `rotate(${i * 6}deg) translateY(-78px)`;
        analogClock.appendChild(tick);
      }
    }

    function currentTimeParts() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      return { h, m, displayHour: displayHour24To12(h), isMorning: h < 12 };
    }

    function updateClock() {
      const { h, m, displayHour, isMorning } = currentTimeParts();
      period.textContent = isMorning ? "ごぜん" : "ごご";
      digitalTime.textContent = `${displayHour}:${pad(m)}`;
      header.classList.toggle("morning", isMorning);
      header.classList.toggle("afternoon", !isMorning);
      skyLeft.textContent = isMorning ? "☀️" : "🌙";
      const hourAngle = (h % 12) * 30 + m * 0.5;
      const minuteAngle = m * 6;
      hourHand.style.transform = `rotate(${hourAngle}deg)`;
      minuteHand.style.transform = `rotate(${minuteAngle}deg)`;
    }

    function speakCurrentTime() {
      const { m, displayHour, isMorning } = currentTimeParts();
      const minuteText = m === 0 ? "ちょうど" : `${m}分`;
      speak(`${isMorning ? "午前" : "午後"}${displayHour}時${minuteText}です`);
    }

    function renderTabs() {
      tabsEl.innerHTML = "";
      tabs.forEach(tab => {
        const btn = document.createElement("button");
        btn.className = `tab ${activeTab === tab.id ? "active" : ""}`;
        btn.textContent = tab.label;
        btn.addEventListener("click", () => {
          activeTab = tab.id;
          localStorage.setItem("oshitaku-active-tab", activeTab);
          renderTabs(); renderButtons();
        });
        tabsEl.appendChild(btn);
      });
    }

    function getVisibleItems() {
      if (activeTab === "favorites") return voiceItems.filter(item => favorites.includes(item.id));
      return voiceItems.filter(item => item.category === activeTab);
    }

    function toggleFavorite(id) {
      favorites = favorites.includes(id) ? favorites.filter(x => x !== id) : [...favorites, id];
      localStorage.setItem("oshitaku-favorites", JSON.stringify(favorites));
      renderButtons();
    }

    function renderButtons() {
      buttonGrid.innerHTML = "";
      const items = getVisibleItems();
      if (items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.style.gridColumn = "1 / -1";
        empty.textContent = "☆をつけたことばが、ここに並びます";
        buttonGrid.appendChild(empty);
        return;
      }
      items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = `voice-card ${item.color}`;
        btn.innerHTML = `
          <button class="favorite-toggle ${favorites.includes(item.id) ? "on" : ""}" aria-label="よく使うことばに追加">★</button>
          <div class="icon">${iconSvg[item.icon]}</div>
          <div class="label">${item.label}</div>
        `;
        btn.addEventListener("click", () => addOrPlay(item));
        btn.querySelector(".favorite-toggle").addEventListener("click", (e) => {
          e.stopPropagation();
          toggleFavorite(item.id);
        });
        buttonGrid.appendChild(btn);
      });
    }

    function setMode(nextMode) {
      mode = nextMode;
      queueMode.classList.toggle("active", mode === "queue");
      instantMode.classList.toggle("active", mode === "instant");
    }

    function addOrPlay(item) {
      if (mode === "instant") speak(item.text);
      else { queue.push(item); renderQueue(); }
    }

    function renderQueue() {
      queueList.innerHTML = "";
      if (queue.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "ことばをえらぶと、ここにならびます";
        queueList.appendChild(empty);
      } else {
        queue.forEach((item, index) => {
          const chip = document.createElement("div");
          chip.className = "chip";
          chip.innerHTML = `<span>${index + 1}. ${item.label.replace("\\n", "")}</span><button aria-label="削除">×</button>`;
          chip.querySelector("button").addEventListener("click", () => { queue.splice(index, 1); renderQueue(); });
          queueList.appendChild(chip);
        });
      }
      const totalSec = Math.max(0, Math.round(queue.reduce((s, item) => s + Math.max(1.2, item.text.length * 0.22), 0)));
      queueMeta.textContent = `ぜんぶの長さ 約 ${totalSec}秒（${queue.length}個）`;
      playBtn.disabled = queue.length === 0;
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("このブラウザでは音声読み上げに対応していません");
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "ja-JP";
      utterance.rate = 0.88;
      utterance.pitch = 1.18;
      utterance.volume = 1;
      window.speechSynthesis.speak(utterance);
    }

    function playQueue() {
      if (queue.length === 0) return;
      speak(queue.map(item => item.text).join("。 ") + "。");
    }

    function stopSpeech() { if ("speechSynthesis" in window) window.speechSynthesis.cancel(); }
    function clearQueue() { queue = []; renderQueue(); }

    header.addEventListener("click", speakCurrentTime);
    queueMode.addEventListener("click", () => setMode("queue"));
    instantMode.addEventListener("click", () => setMode("instant"));
    playBtn.addEventListener("click", playQueue);
    stopBtn.addEventListener("click", stopSpeech);
    clearBtn.addEventListener("click", clearQueue);
    clearSmall.addEventListener("click", clearQueue);

    setupClockFace();
    updateClock();
    renderTabs();
    renderButtons();
    renderQueue();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
